<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendSmart - Login</title>
    
    <!-- Same fonts as main app -->
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,301,400,401,500,501,700,701,900,901,1,2&f[]=supreme@100,101,200,201,300,301,400,401,500,501,700,701,800,801,1,2&f[]=chillax@200,300,400,500,600,700,1&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-wrapper">
        <!-- Left side -->
        <div class="brand-side">
            <div class="brand-content">
                <div class="logo-large">
                    <img src="../images/placeholderS.png" alt="SpendSmart" class="brand-logo">
                </div>
                <h1 class="brand-title">SpendSmart</h1>
                <p class="brand-tagline">Take control of your finances, one expense at a time.</p>
            </div>
        </div>

        <!-- Right side - Login Form -->
        <div class="form-side">
            <div class="card">
                <div class="card-header">
                    <h2>Welcome Back</h2>
                </div>
                <p class="form-subtitle">Log in to continue tracking your expenses</p>

                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i>
                            Email
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="your@email.com" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            Password
                        </label>
                        <div class="password-input-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="••••••••" 
                                required
                            >
                            <button type="button" class="toggle-password" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-login" id="loginButton">
                        <span>Log In</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>

                    <div class="signup-prompt">
                        Don't have an account? 
                        <a href="signup.html" id="signupLink">Sign up</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
