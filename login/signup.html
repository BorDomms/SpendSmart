<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendSmart - Sign Up</title>
    <link rel="icon" type="image/png" href="/images/spendsmart.ico">
    
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,301,400,401,500,501,700,701,900,901,1,2&f[]=supreme@100,101,200,201,300,301,400,401,500,501,700,701,800,801,1,2&f[]=chillax@200,300,400,500,600,700,1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="login-wrapper">
        <!-- Left side - Branding (same as login) -->
        <div class="brand-side">
            <div class="brand-content">
                <div class="logo-large">
                    <img src="/images/spendsmart.png" alt="SpendSmart" class="brand-logo">
                </div>
                <h1 class="brand-title">SpendSmart</h1>
                <p class="brand-tagline">Start managing your money better today!</p>
                
                <!-- Feature highlight -->
                <div class="feature-highlight">
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>Track expenses easily</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>Set monthly budgets</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>Get spending insights</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right side - Sign Up Form -->
        <div class="form-side">
            <div class="form-container">
                
                <h2>Create Account</h2>

                <form id="signupForm" class="login-form">
                    <div class="form-row">
                        <div class="form-group half">
                            <label for="firstName">
                                <i class="fas fa-user"></i>
                                First Name
                            </label>
                            <input 
                                type="text" 
                                id="firstName" 
                                name="firstName" 
                                required
                            >
                        </div>

                        <div class="form-group half">
                            <label for="lastName">
                                <i class="fas fa-user"></i>
                                Last Name
                            </label>
                            <input 
                                type="text" 
                                id="lastName" 
                                name="lastName" 
                                required
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i>
                            Email
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="user@email.com" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            Password
                        </label>
                        <div class="password-input-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="Create a password" 
                                required
                                minlength="6"
                            >
                            <button type="button" class="toggle-password" data-target="password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="password-strength" id="passwordStrength">
                            <div class="strength-bar"></div>
                            <span class="strength-text">Use at least 6 characters</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">
                            <i class="fas fa-lock"></i>
                            Confirm Password
                        </label>
                        <div class="password-input-wrapper">
                            <input 
                                type="password" 
                                id="confirmPassword" 
                                name="confirmPassword" 
                                placeholder="Re-enter password" 
                                required
                            >
                            <button type="button" class="toggle-password" data-target="confirmPassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="password-match" id="passwordMatch"></div>
                    </div>

                    <div class="terms-group">
                        <label class="checkbox-label tos-container">
                            <input type="checkbox" id="terms" required>
                            <span>I agree to the <a href="#" id="termsLink">Terms of Service</a> and <a href="#" id="privacyLink">Privacy Policy</a></span>
                        </label>
                    </div>

                    <button type="submit" class="btn-login" id="signupButton">
                        <span>Create Account</span>
                        <i class="fas fa-user-plus"></i>
                    </button>

                    <div class="signup-prompt">
                        Already have an account? 
                        <a href="login.html" id="loginLink">Log in</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="signup.js"></script>
</body>
</html>
